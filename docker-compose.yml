version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vpn-bot-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vpn_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: vpn-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - vpn-network
    volumes:
      - ./logs:/root/logs

volumes:
  postgres_data:

networks:
  vpn-network:
    driver: bridge